<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#090909"><meta name="apple-mobile-web-app-capable" content="yes"><title>Barbell & Scale</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="styles.css?v=7"></head><body><header><img class="brand-logo" src="logo.svg?v=7" alt="Barbell and Scale logo"><div><h1>Barbell <span>&</span> Scale</h1><p>Talk. Train. Track.</p></div></header><main>
<section class="screen active" data-screen="home"><h2>Welcome back, <span id="homeName">Cameron</span>.</h2><button class="spotter" data-nav="spotter"><img src="spotter-robot.svg" alt="Spotter robot"> <b>SPOTTER</b><span id="spotterSummary">Ready when you are.</span></button><div class="metrics"><article><small>SETS</small><b id="homeSets">0</b></article><article><small>CALORIES</small><b id="homeCalories">0</b></article><article><small>WATER</small><b id="homeWater">0 oz</b></article><article><small>WEIGHT</small><b id="homeWeight">—</b></article></div><div class="card"><h3>Quick log</h3><label>Water (oz)<input id="quickWater" type="number" placeholder="32"></label><button id="quickWaterButton">Add water</button><label>Weight (lb)<input id="quickWeight" type="number" step=".1" placeholder="180.4"></label><button id="quickWeightButton">Log weight</button></div></section>
<section class="screen" data-screen="workout"><h2>Workout</h2><div class="card"><label>Exercise<input id="exerciseName" placeholder="Bench press"></label><label>Weight<input id="exerciseWeight" type="number"></label><label>Reps<input id="exerciseReps" type="number"></label><label>Notes<input id="exerciseNotes"></label><button id="addSetButton">Add set</button></div><h3>Today’s sets</h3><div id="todaySets"></div></section>
<section class="screen" data-screen="nutrition"><h2>Nutrition</h2><div class="card"><label>Food<input id="mealName" placeholder="Chicken taco bowl"></label><label>Calories<input id="mealCalories" type="number"></label><label>Protein<input id="mealProtein" type="number"></label><button id="addMealButton">Add meal</button></div><h3>Today’s meals</h3><div id="mealList"></div></section>
<section class="screen" data-screen="spotter"><div class="spotter-title"><img src="spotter-robot.svg" alt=""><h2>Spotter</h2><span id="aiStatus" class="online-dot checking">CHECKING</span></div><div class="card"><div id="chatLog" class="chat"></div><button id="voiceButton" class="mic">🎙️</button><p id="voiceStatus">Tap to talk</p><input id="chatInput" placeholder="Tell Spotter what you did"><button id="sendChatButton">Send</button></div></section>
<section class="screen" data-screen="progress"><h2>Progress</h2><div class="metrics"><article><small>TOTAL SETS</small><b id="progressSets">0</b></article><article><small>WORKOUT DAYS</small><b id="progressDays">0</b></article></div><h3>Weight history</h3><div id="weightHistory"></div></section>
<section class="screen" data-screen="profile"><h2>Profile</h2><div class="card"><label>Name<input id="profileName"></label><label>Calories goal<input id="goalCalories" type="number"></label><label>Water goal<input id="goalWater" type="number"></label><button id="saveProfileButton">Save profile</button></div><button id="exportButton" class="secondary">Export backup</button><button id="resetButton" class="danger">Reset all data</button></section>
</main><nav><button data-nav="home">⌂<span>Home</span></button><button data-nav="workout">🏋️<span>Workout</span></button><button data-nav="nutrition">🍎<span>Food</span></button><button data-nav="spotter">💬<span>Spotter</span></button><button data-nav="progress">📈<span>Progress</span></button></nav><div id="toast"></div><script src="app.js?v=5" defer></script></body></html>
